# =============================================================================
# sysctl.d — Kernel parameter tuning for dev workstation
# Managed by chezmoi
# =============================================================================

# ---- Virtual memory ----
# Reduce swappiness (don't swap unless absolutely necessary)
vm.swappiness = 10

# Increase dirty page writeback (better for SSDs)
vm.dirty_ratio = 50
vm.dirty_background_ratio = 5

# Improve cache pressure (keep inode/dentry cache longer)
vm.vfs_cache_pressure = 50

# ---- Filesystem ----
# Increase inotify watches (needed for many watchers: lsp, watchexec, etc.)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024
fs.inotify.max_queued_events = 16384

# Reduce time to check for stale file handles
fs.file-max = 1048576

# ---- Network ----
# Increase network buffer sizes
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.ipv4.tcp_rmem = 4096 131072 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728

# TCP Fast Open (both client and server)
net.ipv4.tcp_fastopen = 3

# Enable TCP BBR congestion control
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# ---- Kernel ----
# Improve desktop responsiveness
kernel.numa_balancing = 0
