onboarding = false
[theme]
name = "gruvbox"
auto_switch = false

[keys]
prefix = "ctrl+g"

# Tab operations — direct bindings, no prefix needed (frictionless)
next_tab = "ctrl+shift+right"
previous_tab = "ctrl+shift+left"
new_tab = "ctrl+shift+t"
close_tab = "ctrl+shift+w"
rename_tab = "ctrl+shift+r"

# Workspace operations with prefix
workspace_picker = "prefix+w"
previous_workspace = "prefix+shift+h"
next_workspace = "prefix+shift+l"
new_workspace = "prefix+shift+n"
close_workspace = "prefix+shift+d"

# Pane operations with prefix
split_vertical = "prefix+v"
split_horizontal = "prefix+minus"
close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

# Navigation mode
help = "prefix+?"
settings = "prefix+s"
detach = "prefix+q"
reload_config = "prefix+shift+r"

# --- vim-herdr-navigation (Ctrl+h/j/k/l across herdr + vim splits)
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

# --- herdr.nvim (Rust helper, marker-based — Ctrl+Alt as alt nav)
[[keys.command]]
key = "ctrl+alt+h"
type = "shell"
command = "herdr-navigator dispatch left"

[[keys.command]]
key = "ctrl+alt+j"
type = "shell"
command = "herdr-navigator dispatch down"

[[keys.command]]
key = "ctrl+alt+k"
type = "shell"
command = "herdr-navigator dispatch up"

[[keys.command]]
key = "ctrl+alt+l"
type = "shell"
command = "herdr-navigator dispatch right"

[[keys.command]]
key = "prefix+\\"
type = "shell"
command = "herdr-navigator split right"

[[keys.command]]
key = "prefix+minus"
type = "shell"
command = "herdr-navigator split down"

# --- herdr-plus plugin bindings
[keys.indexed]
tabs = "ctrl"

[[keys.command]]
key = "prefix+up"
type = "plugin_action"
command = "cloudmanic.herdr-plus.projects"
description = "herdr-plus: projects"

[[keys.command]]
key = "prefix+down"
type = "plugin_action"
command = "cloudmanic.herdr-plus.quick-actions"
description = "herdr-plus: quick actions"
