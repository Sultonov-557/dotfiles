# =============================================================================
# tmux.conf — Terminal multiplexer
# =============================================================================
# Managed by chezmoi
# =============================================================================

# --- Mouse ---
set -g mouse on
set -g focus-events on

# --- Base index ---
set -g base-index 1
set -g pane-base-index 1

# --- History ---
set -g history-limit 50000

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g display-time 3000

# --- Status bar ---
set -g status-interval 5
set -g status-position top
set -g status-style bg="#282828",fg="#ebdbb2"
set -g status-left "#[fg=#b8bb26,bold] #S "
set -g status-left-style bg="#282828"
set -g status-right "#[fg=#83a598]#(date '+%H:%M') "
set -g status-right-style bg="#282828"

# Windows
set -g window-status-current-style bg="#504945",fg="#b8bb26",bold
set -g window-status-style bg="#282828",fg="#a89984"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator ""

# Pane border
set -g pane-border-style fg="#504945"
set -g pane-active-border-style fg="#b8bb26"

# --- Keybindings (vi style) ---
set -g mode-keys vi
set -g status-keys vi

# Use vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-processes 'ssh gh nvim lazygit'

# Continuum (auto-save every 15 min, auto-restore)
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Yank
set -g @yank-with-mouse 'on'

# --- Initialize TPM ---
run '~/.tmux/plugins/tpm/tpm'
