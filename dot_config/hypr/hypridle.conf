# =============================================================================
# Hypridle — Idle management daemon
# =============================================================================
# Managed by chezmoi
# Ties into hyprlock for locking

# --- Laptop / general ---
general {
    lock_cmd = pidof hyprlock || hyprctl dispatch exec hyprlock
    unlock_cmd = pidof hyprlock && killall hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# --- Timed lock ---
listener {
    timeout = 300          # 5 min idle → lock
    on-timeout = loginctl lock-session
}

# --- Screen off ---
listener {
    timeout = 600          # 10 min → screen off
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# --- Suspend ---
listener {
    timeout = 900          # 15 min → suspend
    on-timeout = systemctl suspend
}
