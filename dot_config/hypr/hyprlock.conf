# =============================================================================
# Hyprlock — Lock screen
# =============================================================================
# Sources Noctalia color variables (shared with Hyprland)
# Managed by chezmoi

source = ~/.config/hypr/noctalia/noctalia-colors.conf

# --- General ---
general {
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    grace = 0
    disable_loading_bar = true
    immediate_render = false
}

# --- Background ---
background {
    monitor =
    path = screenshot
    color = $surface
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.4
}

# --- Clock ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = $primary
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

# --- Date ---
label {
    monitor =
    text = cmd[update:3600] echo "$(date '+%A, %B %d')"
    color = $tertiary
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 70
    halign = center
    valign = center
}


# --- Lockscreen indicator ---
label {
    monitor =
    text =   Locked
    color = rgb(7f849c)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

# --- Input field ---
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgb(585b70)
    inner_color = $surface
    font_color = $primary
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}
