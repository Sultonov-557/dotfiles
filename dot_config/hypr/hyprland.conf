# =============================================================================
# Hyprland Configuration — Riced af
# =============================================================================
# Source: ~/dotfiles/hypr
# Managed with GNU Stow
#
# PRIMARY CONFIG: hyprland.lua (Hyprland v0.55.4+ Lua API)
# This .conf shim sources the Lua config and holds settings that
# the Lua API doesn't expose yet (unknown key fallback).
# =============================================================================

source = ~/.config/hypr/hyprland.lua
source = ~/.config/hypr/noctalia/noctalia-colors.conf

# --- General extras (not yet in Lua API) ---
general {
    no_border_on_floating   = false
    hover_icon_on_border    = true
    extend_border_grab_area = 15
    cursor_inactive_timeout = 3
}

# --- Decoration extras ---
decoration {
    fullscreen_opacity = 1.0

    shadow {
        color_inactive = rgba(1c1c1cee)
        offset = 0 4
        scale = 0.97
        blur = true
        blur_passes = 2
        ignore_window = true
    }

    blur {
        noise = 0.01
        contrast = 0.9
        brightness = 1.0
        new_optimizations = true
        xray = false
    }
}

# --- Animations extras ---
animations {
    first_launch_animation = true
}

# --- Input extras ---
input {
    touchpad {
        scroll_factor = 0.8
    }
    numlock_by_default = true
    float_switch_override_focus = 2
}

# --- Dwindle extras ---
dwindle {
    pseudotile = true
    smart_split = false
    smart_resizing = true
    special_scale_factor = 0.8
    split_width_multiplier = 1.0
    force_split = 0
}

# --- Master extras ---
master {
    mfact = 0.55
    special_scale_factor = 0.8
    orientation = left
    smart_count = false
}

# --- Misc extras ---
misc {
    disable_splash_rendering = true
    initial_workspace_tracking = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    enable_swallow = true
    swallow_regex = ^(kitty|ghostty|alacritty)$
    font_size_fallback = true
    vrr = 0
    disable_autoreload = false
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

# --- Binds config (not yet in Lua API) ---
binds {
    pass_mouse_when_bound = false
    scroll_event_delay = 300
    workspace_back_and_forth = true
    allow_workspace_cycles = true
    window_drop_shadow_toggle = false
    movefocus_cycles_fullscreen = false
}

# --- Autostart (exec-once handled in lua, but extra safety) ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sleep 1 && hyprctl setcursor Bibata-Modern-Classic 24
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpaper & nm-applet --indicator & blueman-applet
exec-once = cliphist-wl &
exec-once = dunst &
exec-once = sleep 3 && hyprctl reload

# --- Window rules (not yet in Lua API) ---
windowrulev2 = opacity 0.95 0.85, class:^(floorp|firefox|brave|zen)$
windowrulev2 = noborder, fullscreen:1
