# Hyprpaper — Wallpaper manager config
# Managed by chezmoi
# Wallpapers deployed from dotfiles/dot_pictures/Wallpapers/
#
# Available (from NixOS dotfiles migration):
#   gruvbox.png      — Gruvbox default
#   catppuccin.png   — Catppuccin Mocha
#   everforest.png   — Everforest Dark
#   nord.png         — Nord

preload = ~/Pictures/Wallpapers/gruvbox.png
preload = ~/Pictures/Wallpapers/catppuccin.png

wallpaper = ,~/Pictures/Wallpapers/gruvbox.png

# Uncomment for multi-monitor:
# wallpaper = DP-1,~/Pictures/Wallpapers/gruvbox.png
# wallpaper = HDMI-A-1,~/Pictures/Wallpapers/catppuccin.png

splash = false
