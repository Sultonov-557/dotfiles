# Hyprpaper — Wallpaper manager config
# NOTE: Place wallpapers in ~/Pictures/Wallpapers/ after fresh install.
# Expected files:
#   ~/Pictures/Wallpapers/gruvbox_mountains.png
#   ~/Pictures/Wallpapers/gruvbox_forest.png
# If these files don't exist, hyprpaper will fail silently.
# You can download or copy wallpapers there manually.

preload = ~/Pictures/Wallpapers/gruvbox_mountains.png
preload = ~/Pictures/Wallpapers/gruvbox_forest.png

wallpaper = ,~/Pictures/Wallpapers/gruvbox_mountains.png

# Uncomment for multi-monitor:
# wallpaper = eDP-1,~/Pictures/Wallpapers/gruvbox_mountains.png
# wallpaper = HDMI-A-1,~/Pictures/Wallpapers/gruvbox_forest.png

splash = false
