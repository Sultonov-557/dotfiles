# Hyprpaper — Wallpaper manager config
# Managed by chezmoi
# Wallpapers deployed from dotfiles/Pictures/Wallpapers/
#
# 336 Catppuccin Mocha wallpapers from orangci/walls-catppuccin-mocha

preload = ~/Pictures/Wallpapers/cat-street.jpg

wallpaper = ,~/Pictures/Wallpapers/cat-street.jpg

# Uncomment for multi-monitor:
# wallpaper = DP-1,~/Pictures/Wallpapers/cat-street.jpg
# wallpaper = HDMI-A-1,~/Pictures/Wallpapers/cat-in-clouds.png

splash = false
