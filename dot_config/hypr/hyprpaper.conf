# Hyprpaper — Wallpaper manager config
# Managed by chezmoi
# Wallpapers deployed from dotfiles/dot_pictures/Wallpapers/
#
# Available (from Catppuccin Mocha walls submodule):
#   catppuccin-mocha/  — 300+ wallpapers from orangci/walls-catppuccin-mocha

preload = ~/Pictures/Wallpapers/catppuccin-mocha/cat-street.jpg
preload = ~/Pictures/Wallpapers/catppuccin-mocha/lavender-fields.jpg

wallpaper = ,~/Pictures/Wallpapers/catppuccin-mocha/cat-street.jpg

# Uncomment for multi-monitor:
# wallpaper = DP-1,~/Pictures/Wallpapers/catppuccin-mocha/cat-street.jpg
# wallpaper = HDMI-A-1,~/Pictures/Wallpapers/catppuccin-mocha/cat-in-clouds.png

splash = false
