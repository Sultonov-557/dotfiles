# =============================================================================
# Yazi — Gruvbox Dark theme
# Managed by chezmoi
# =============================================================================

[flavor]
use = "catppuccin-mocha"

[status]
# Normal mode
separator_open = ""
separator_close = ""
separator_style = { fg = "#504945", bg = "#282828" }

# Modes
mode_normal = { fg = "#282828", bg = "#b8bb26" }
mode_select = { fg = "#282828", bg = "#83a598" }
mode_unset = { fg = "#282828", bg = "#928374" }

# Progress
progress_label = { fg = "#ebdbb2", bg = "#504945" }
progress_normal = { fg = "#b8bb26", bg = "#504945" }

# Permissions
permissions_t = { fg = "#fabd2f" }
permissions_r = { fg = "#b8bb26" }
permissions_w = { fg = "#fb4934" }
permissions_x = { fg = "#83a598" }
permissions_s = { fg = "#d3869b" }

[manager]
# Preview
preview_hovered = { fg = "#ebdbb2", bg = "#3c3836" }

# Tabs
tab_active = { fg = "#1d2021", bg = "#b8bb26" }
tab_inactive = { fg = "#928374", bg = "#282828" }
tab_width = 1

# Borders
border_style = { fg = "#504945" }
border_symbol = "│"

# Synthesis
synt_dir = { fg = "#83a598", bold = true }
synt_exec = { fg = "#b8bb26", bold = true }
synt_link = { fg = "#d3869b", bold = true }
synt_socket = { fg = "#8ec07c" }
synt_pipe = { fg = "#8ec07c" }
synt_block = { fg = "#fe8019" }
synt_char = { fg = "#fe8019" }
synt_other = { fg = "#ebdbb2" }

# Selection
selected = { fg = "#fabd2f", underline = true }
cut = { fg = "#fb4934", underline = true }

# Find
find_key = { fg = "#b8bb26", bold = true }
find_pos = { fg = "#1d2021", bg = "#fabd2f" }

# Highlight
hovered = { fg = "#ebdbb2", bg = "#3c3836" }

[header]
# Header (for the top line showing cwd, etc.)
header_style = { fg = "#928374", bg = "#1d2021" }
header_suffix = { fg = "#928374", bg = "#1d2021" }

[which]
# Key binding popup
cols = 2
mask = { bg = "#1d2021" }
cands = { fg = "#ebdbb2", bg = "#282828" }
cands_active = { fg = "#b8bb26", bg = "#504945" }
rest = { fg = "#928374" }
separator = "  ➜  "

[help]
# Help menu
on = { fg = "#ebdbb2", bg = "#282828" }
run = { fg = "#928374" }
desc = { fg = "#83a598" }
footer = { fg = "#928374", bg = "#1d2021" }

[input]
# Input bar
border = { fg = "#83a598" }
title = { fg = "#b8bb26" }
value = { fg = "#ebdbb2", bg = "#282828" }
selected = { fg = "#1d2021", bg = "#b8bb26" }

[select]
# Selection prompt
border = { fg = "#fabd2f" }
active = { fg = "#1d2021", bg = "#b8bb26" }
inactive = { fg = "#ebdbb2", bg = "#3c3836" }

[notify]
# Notifications
title_info = { fg = "#83a598" }
title_warn = { fg = "#fabd2f" }
title_error = { fg = "#fb4934" }
icon_info = { fg = "#83a598" }
icon_warn = { fg = "#fabd2f" }
icon_error = { fg = "#fb4934" }

[sort]
# Sort indicator
icon = { fg = "#928374" }
icon_reverse = { fg = "#928374" }
