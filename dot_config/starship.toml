# Starship Prompt — Minimal Gruvbox
format = """\
$directory\
$git_branch\
$git_status\
$line_break\
$character\
"""

[directory]
style = "fg:#ebdbb2"
truncation_length = 2
truncation_symbol = "…/"

[git_branch]
style = "fg:#83a598"
format = " on [$symbol$branch]($style)"

[git_status]
style = "fg:#ebdbb2"
format = '[$all_status$ahead_behind]($style)'
conflicted = " 🏳"
up_to_date = ""
untracked = " ?"
stashed = " 📦"
modified = " !"
staged = " +"
renamed = " »"
deleted = " ✘"

[character]
success_symbol = "[❯](bold fg:#b8bb26)"
error_symbol = "[❯](bold fg:#fb4934)"
vicmd_symbol = "[❮](bold fg:#83a598)"
