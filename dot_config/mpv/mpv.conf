# MPV — Media player
# Managed by chezmoi

# --- Video ---
hwdec=vaapi
vo=gpu-next
gpu-context=wayland
gpu-api=vulkan
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
video-sync=display-resample
interpolation=yes
tscale=oversample

# --- Audio ---
volume=70
volume-max=150

# --- OSD ---
osd-font="JetBrainsMono Nerd Font"
osd-font-size=28
osd-bar-align-y=0.95
osd-bar-h=2
osd-border-color="#282828"
osd-color="#ebdbb2"
osd-blur=0

# --- Behavior ---
save-position-on-quit=yes
keep-open=yes
loop-playlist=no
autoload-files=yes

# --- Screenshots ---
screenshot-directory="~/Pictures/Screenshots"
screenshot-format=png
screenshot-template="mpv-screenshot-%f-%p-%n"

# --- Cache ---
cache=yes
cache-secs=30
demuxer-max-bytes=150M

# --- Subtitles ---
sub-font="JetBrainsMono Nerd Font"
sub-font-size=40
sub-border-size=2
sub-shadow-offset=1
sub-color="#ebdbb2"
sub-border-color="#1d2021"
sub-auto=fuzzy
bluray-device=
dvd-device=
