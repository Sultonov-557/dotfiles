# =============================================================================
# btop — Resource monitor config (Gruvbox Dark)
# Managed by chezmoi
# =============================================================================

# --- Theme ---
color_theme = "catppuccin_mocha"
theme_background = true

# --- Appearance ---
rounded_corners = true
graph_symbol = "block"
graph_lines = true
shown_boxes = "cpu mem net proc"
update_ms = 2000
proc_sorting = "cpu lazy"
proc_tree = true
proc_gradient = true
proc_per_core = true

# --- CPU ---
cpu_sensor = "Auto"
show_uptime = true
check_temp = true

# --- Memory ---
mem_below_net = true
show_swap = true
swap_disk = true

# --- Disks ---
disk_filter = "btrfs|ext4|xfs|zfs"
disk_free_priv = false

# --- Network ---
net_download = 100
net_upload = 100
net_iface = "auto"

# --- GPU ---
gpu_memory = false

# --- Colors (Gruvbox Dark) ---
# These override the theme file for specific values
presets = "cpu:4,mem:5,net:6,proc:7"
truecolor = true
force_tty = false

# --- Error handling ---
error_delay = 500
